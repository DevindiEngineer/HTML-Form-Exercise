<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body style="background-color: rgb(226, 183, 212);">
    <fieldset style="border-color: black;">
        <h1 style="text-align: center;"><b>Student Registration Form</b></h1>

        <style>
            label {
                display: inline-block;
                width: 125px;
            }
        </style>
        <br>
        <label>Student name : </label>
        <input type="text" placeholder="First Name">
        <input type="text" placeholder="Last Name">
        <br>
        <label>NIC number : </label>
        <input type="number">
        <br>
        <label>Address : </label>
        <input type="text">
        <br>

        <label>District :</label>
        <select>
            <option>Select</option>
            <option>Colombo</option>
            <option>Gampaha</option>
            <option>Kaluthara</option>
            <option>Other</option>
        </select>

        <br>
        <label>Date of Birth : </label>
        <input type="date">
        <br>
        <label>Mobile number : </label>
        <input type="number" placeholder="+94">
        <input type="number">
        <br>
        <label>E - mail : </label>
        <input type="text">
        <br>
        <label>Password : </label>
        <input type="password">
        <br>
        <label>Gender : </label>
        <label>Female</label>
        <input type="radio">
        <label>Male</label>
        <input type="radio">
        <br>
        <label>Department : </label>
        <label>Medicine</label>
        <input type="checkbox">
        <label>Engineering</label>
        <input type="checkbox">
        <label>Computing</label>
        <input type="checkbox">
        <label>Business</label>
        <input type="checkbox">
        <label>Law</label>
        <input type="checkbox">
        <br>
        <label>Find your course : </label>
        <input type="search" list="courses" placeholder="Search your course">
        <datalist id="courses">
            <option value="PHD"></option>
            <option value="MSc"></option>
            <option value="Bsc"></option>
            <option value="HND"></option>
            <option value="Diploma"></option>
            <option value="Short courses"></option>
        </datalist>
        <br>
        <label>Studnet NIC : </label>
        <input type="file">
        <br>
    </fieldset>
    <br>
    <input type="reset">
    <input type="submit">
</body>

</html>
